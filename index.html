<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AuraMatch — AI Dating</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          bg: '#0F0F1A',
          card: '#17172A',
          primary: '#7F5AF0',
          pink: '#FF4D8D',
          accent: '#00E5FF',
        },
        fontFamily: {
          sans: ['Plus Jakarta Sans', 'sans-serif'],
        },
      }
    }
  }
</script>
<style>
  :root {
    --bg: #0F0F1A;
    --card: #17172A;
    --primary: #7F5AF0;
    --pink: #FF4D8D;
    --accent: #00E5FF;
    --grad-primary: linear-gradient(135deg, #7F5AF0, #FF4D8D);
    --text-primary: #E8E8F0;
    --text-muted: #6B6B8A;
    --border-glass: rgba(255,255,255,0.08);
    --shadow-glow: 0 0 40px rgba(127,90,240,0.25);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    overflow: hidden;
    height: 100vh;
  }

  #root {
    display: grid;
    grid-template-columns: 280px 1fr 320px;
    height: 100vh;
    overflow: hidden;
  }

  /* Scrollbars */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(127,90,240,0.4); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(127,90,240,0.7); }

  /* Left Sidebar */
  #sidebar {
    background: var(--card);
    border-right: 1px solid var(--border-glass);
    display: flex;
    flex-direction: column;
    padding: 24px 0;
    overflow-y: auto;
    overflow-x: hidden;
  }

  .logo-block {
    padding: 0 20px 24px;
    border-bottom: 1px solid var(--border-glass);
    margin-bottom: 8px;
  }

  .logo-text {
    font-size: 22px;
    font-weight: 800;
    background: var(--grad-primary);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
  }

  .ai-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: rgba(127,90,240,0.15);
    border: 1px solid rgba(127,90,240,0.3);
    border-radius: 20px;
    padding: 2px 8px;
    font-size: 10px;
    font-weight: 600;
    color: #7F5AF0;
    margin-top: 4px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .nav-list { padding: 8px 12px; }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 2px;
  }

  .nav-item:hover {
    background: rgba(255,255,255,0.05);
    color: var(--text-primary);
  }

  .nav-item.active {
    background: rgba(127,90,240,0.15);
    color: var(--text-primary);
  }

  .nav-item.active .nav-icon {
    background: var(--grad-primary);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .nav-item.active svg { filter: drop-shadow(0 0 6px rgba(127,90,240,0.6)); }

  .section-label {
    padding: 16px 20px 8px;
    font-size: 10px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1.2px;
  }

  .match-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    cursor: pointer;
    transition: background 0.2s;
    position: relative;
  }

  .match-item:hover { background: rgba(255,255,255,0.03); }

  .match-avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    flex-shrink: 0;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 700;
    color: white;
  }

  .match-score-badge {
    position: absolute;
    bottom: -2px;
    right: -2px;
    background: var(--grad-primary);
    border-radius: 8px;
    padding: 1px 4px;
    font-size: 8px;
    font-weight: 700;
    color: white;
    border: 1.5px solid var(--card);
  }

  .unread-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--pink);
    flex-shrink: 0;
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.7); }
  }

  .ai-suggestion-card {
    margin: 12px 16px;
    background: rgba(127,90,240,0.08);
    border: 1px solid rgba(127,90,240,0.2);
    border-radius: 16px;
    padding: 14px 16px;
    position: relative;
    overflow: hidden;
  }

  .ai-suggestion-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(127,90,240,0.1) 0%, transparent 60%, rgba(255,77,141,0.08) 100%);
    animation: shimmer-bg 4s ease-in-out infinite alternate;
  }

  @keyframes shimmer-bg {
    0% { opacity: 0.6; }
    100% { opacity: 1; }
  }

  /* Center Panel */
  #center-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 24px;
    overflow-y: auto;
    gap: 16px;
    background: var(--bg);
  }

  .match-banner {
    width: 100%;
    max-width: 480px;
    background: var(--card);
    border: 1px solid var(--border-glass);
    border-radius: 20px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .match-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--grad-primary);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 700;
    color: white;
    letter-spacing: 0.3px;
  }

  .score-display {
    text-align: right;
  }

  .score-number {
    font-size: 28px;
    font-weight: 800;
    background: var(--grad-primary);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  /* Profile Card */
  #profile-card {
    width: 100%;
    max-width: 480px;
    border-radius: 24px;
    overflow: hidden;
    background: var(--card);
    border: 1px solid var(--border-glass);
    box-shadow: var(--shadow-glow);
    animation: cardEntrance 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    position: relative;
  }

  @keyframes cardEntrance {
    from { opacity: 0; transform: translateY(24px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  @keyframes slideLeft {
    from { transform: translateX(0) rotate(0deg); opacity: 1; }
    to { transform: translateX(-120%) rotate(-15deg); opacity: 0; }
  }

  @keyframes slideRight {
    from { transform: translateX(0) rotate(0deg); opacity: 1; }
    to { transform: translateX(120%) rotate(15deg); opacity: 0; }
  }

  .photo-carousel {
    position: relative;
    height: 380px;
    overflow: hidden;
  }

  .photo-slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .photo-slide.active {
    opacity: 1;
    animation: photoFadeIn 0.4s ease both;
  }

  @keyframes photoFadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .photo-pattern {
    position: absolute;
    inset: 0;
    opacity: 0.1;
  }

  .photo-scrim {
    position: absolute;
    inset: 0;
    background: linear-gradient(transparent 30%, rgba(0,0,0,0.85) 100%);
  }

  .photo-progress-dots {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4px;
    z-index: 10;
  }

  .progress-dot {
    height: 3px;
    border-radius: 2px;
    background: rgba(255,255,255,0.5);
    transition: width 0.3s ease, background 0.3s ease;
    width: 20px;
  }

  .progress-dot.active {
    width: 36px;
    background: white;
  }

  .photo-nav-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 10;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    color: white;
  }

  .photo-nav-btn:hover { background: rgba(255,255,255,0.25); }
  .photo-nav-btn.prev { left: 12px; }
  .photo-nav-btn.next { right: 12px; }

  .photo-overlay-info {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 20px;
    z-index: 5;
  }

  .tag-pill {
    display: inline-flex;
    align-items: center;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 500;
    color: white;
    margin: 2px;
  }

  .thumbnail-strip {
    display: flex;
    gap: 6px;
    padding: 10px 12px;
    overflow-x: auto;
    background: rgba(0,0,0,0.2);
  }

  .thumbnail {
    width: 52px;
    height: 52px;
    border-radius: 8px;
    flex-shrink: 0;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.2s, transform 0.2s;
    overflow: hidden;
    position: relative;
  }

  .thumbnail.active { border-color: var(--primary); }
  .thumbnail:hover { transform: scale(1.05); }

  /* Action Buttons */
  .action-buttons {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    max-width: 480px;
  }

  .action-btn {
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    flex-shrink: 0;
  }

  .action-btn:hover { transform: scale(1.1); }
  .action-btn:active { transform: scale(0.95); }

  .btn-pass {
    width: 52px; height: 52px;
    background: rgba(255,80,80,0.12);
    border: 2px solid rgba(255,80,80,0.3);
    color: #FF5050;
  }
  .btn-pass:hover { box-shadow: 0 0 20px rgba(255,80,80,0.4); }

  .btn-superlike {
    width: 52px; height: 52px;
    background: rgba(0,229,255,0.12);
    border: 2px solid rgba(0,229,255,0.3);
    color: var(--accent);
  }
  .btn-superlike:hover { box-shadow: 0 0 20px rgba(0,229,255,0.4); }

  .btn-like {
    width: 64px; height: 64px;
    background: var(--grad-primary);
    border: none;
    color: white;
    box-shadow: 0 4px 20px rgba(255,77,141,0.4);
  }
  .btn-like:hover { box-shadow: 0 8px 30px rgba(255,77,141,0.6); }

  .btn-boost {
    width: 52px; height: 52px;
    background: rgba(127,90,240,0.12);
    border: 2px solid rgba(127,90,240,0.3);
    color: var(--primary);
  }
  .btn-boost:hover { box-shadow: 0 0 20px rgba(127,90,240,0.4); }

  .btn-message {
    width: 52px; height: 52px;
    background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.12);
    color: var(--text-muted);
  }
  .btn-message:hover { box-shadow: 0 0 20px rgba(255,255,255,0.15); }

  /* Right Panel */
  #right-panel {
    background: var(--card);
    border-left: 1px solid var(--border-glass);
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .panel-section {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border-glass);
    border-radius: 16px;
    padding: 16px;
  }

  .section-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  .trait-row {
    margin-bottom: 10px;
  }

  .trait-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 5px;
    font-size: 12px;
  }

  .trait-name { font-weight: 500; color: var(--text-primary); }
  .trait-value { font-weight: 700; color: var(--primary); }

  .trait-bar-bg {
    height: 6px;
    background: rgba(255,255,255,0.06);
    border-radius: 3px;
    overflow: hidden;
  }

  .trait-bar-fill {
    height: 100%;
    border-radius: 3px;
    background: var(--grad-primary);
    width: 0%;
    transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Vibe tags with gradient border */
  .vibe-tag {
    display: inline-block;
    position: relative;
    border-radius: 20px;
    padding: 1px;
    background: var(--grad-primary);
    margin: 3px;
  }

  .vibe-tag-inner {
    background: var(--card);
    border-radius: 19px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-primary);
  }

  .anthem-card {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(0,0,0,0.3);
    border-radius: 12px;
    padding: 12px;
  }

  .anthem-art {
    width: 44px;
    height: 44px;
    border-radius: 8px;
    background: linear-gradient(135deg, #1DB954, #169140);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .pref-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .pref-item {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
    padding: 8px 10px;
    font-size: 12px;
  }

  .pref-emoji { font-size: 16px; }
  .pref-label { color: var(--text-muted); font-size: 10px; }
  .pref-value { color: var(--text-primary); font-weight: 500; font-size: 12px; }

  .about-section {
    border-top: 2px solid;
    border-image: var(--grad-primary) 1;
    padding-top: 12px;
  }

  .quick-fact {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border-glass);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    margin: 3px;
  }

  /* Particles */
  @keyframes particleBurst {
    0% { transform: translate(0, 0) scale(1); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
  }

  @keyframes rippleExpand {
    0% { transform: translate(-50%, -50%) scale(0); opacity: 0.8; }
    100% { transform: translate(-50%, -50%) scale(3); opacity: 0; }
  }

  .particle {
    position: fixed;
    pointer-events: none;
    border-radius: 50%;
    animation: particleBurst 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    z-index: 9999;
  }

  .ripple-ring {
    position: fixed;
    pointer-events: none;
    border-radius: 50%;
    border: 3px solid var(--accent);
    animation: rippleExpand 0.8s ease-out forwards;
    z-index: 9999;
    width: 60px;
    height: 60px;
  }

  /* Glassmorphism utility */
  .glass {
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border-glass);
  }

  /* Verified badge */
  .verified-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    background: rgba(0,229,255,0.1);
    border: 1px solid rgba(0,229,255,0.3);
    border-radius: 20px;
    padding: 2px 8px;
    font-size: 10px;
    font-weight: 600;
    color: var(--accent);
  }
</style>
</head>
<body>

<div id="root">
  <!-- LEFT SIDEBAR -->
  <aside id="sidebar">
    <div class="logo-block">
      <div class="logo-text">AuraMatch</div>
      <div class="ai-badge">
        <svg width="8" height="8" viewBox="0 0 8 8" fill="currentColor"><circle cx="4" cy="4" r="3"/></svg>
        AI Powered
      </div>
    </div>

    <nav class="nav-list">
      <div class="nav-item active" data-nav="home">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
        <span>Discover</span>
      </div>
      <div class="nav-item" data-nav="messages">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>Messages</span>
      </div>
      <div class="nav-item" data-nav="matches">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span>Matches</span>
      </div>
      <div class="nav-item" data-nav="profile">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Profile</span>
      </div>
      <div class="nav-item" data-nav="settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>Settings</span>
      </div>
    </nav>

    <div class="section-label">Recent Matches</div>
    <div id="recent-matches"></div>

    <div class="ai-suggestion-card">
      <div style="position:relative;z-index:1;">
        <div style="font-size:10px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;display:flex;align-items:center;gap:5px;">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
          AI Insight
        </div>
        <p id="ai-suggestion" style="font-size:12px;line-height:1.5;color:var(--text-muted);font-style:italic;"></p>
      </div>
    </div>
  </aside>

  <!-- CENTER PANEL -->
  <main id="center-panel">
    <div class="match-banner">
      <div>
        <div class="match-pill">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
          AI Match Analysis
        </div>
        <p id="match-subtitle" style="font-size:11px;color:var(--text-muted);margin-top:6px;"></p>
      </div>

function getPatternSVG(type) {
  const patterns = {
    geometric: `<svg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"><polygon points="30,5 55,20 55,40 30,55 5,40 5,20" fill="none" stroke="white" stroke-width="1"/><line x1="30" y1="5" x2="30" y2="55" stroke="white" stroke-width="0.5"/><line x1="5" y1="20" x2="55" y2="40" stroke="white" stroke-width="0.5"/><line x1="5" y1="40" x2="55" y2="20" stroke="white" stroke-width="0.5"/></svg>`,
    wave: `<svg width="80" height="40" viewBox="0 0 80 40" xmlns="http://www.w3.org/2000/svg"><path d="M0,20 C20,5 40,35 80,20" fill="none" stroke="white" stroke-width="1.5"/><path d="M0,30 C20,15 40,45 80,30" fill="none" stroke="white" stroke-width="1.5"/><path d="M0,10 C20,-5 40,25 80,10" fill="none" stroke="white" stroke-width="1.5"/></svg>`,
    dots: `<svg width="20" height="20" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><circle cx="10" cy="10" r="2" fill="white"/></svg>`,
    mesh: `<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><line x1="0" y1="0" x2="40" y2="40" stroke="white" stroke-width="0.8"/><line x1="40" y1="0" x2="0" y2="40" stroke="white" stroke-width="0.8"/><line x1="20" y1="0" x2="20" y2="40" stroke="white" stroke-width="0.5"/><line x1="0" y1="20" x2="40" y2="20" stroke="white" stroke-width="0.5"/></svg>`,
    grid: `<svg width="30" height="30" viewBox="0 0 30 30" xmlns="http://www.w3.org/2000/svg"><rect x="0" y="0" width="30" height="30" fill="none" stroke="white" stroke-width="0.8"/><line x1="15" y1="0" x2="15" y2="30" stroke="white" stroke-width="0.4"/><line x1="0" y1="15" x2="30" y2="15" stroke="white" stroke-width="0.4"/></svg>`,
  };
  const svg = patterns[type] || patterns.geometric;
  return `url("data:image/svg+xml,${encodeURIComponent(svg)}")`;
}

// ============================================================
// SCORE COUNTER ANIMATION
// ============================================================
let scoreRafId = null;

function animateScore(target) {
  if (scoreRafId) cancelAnimationFrame(scoreRafId);
  const el = document.getElementById('score-counter');
  if (!el) return;
  el.textContent = '0';
  const duration = 1800;
  const start = performance.now();
  function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
  function step(now) {
    const elapsed = now - start;
    const progress = Math.min(elapsed / duration, 1);
    const value = Math.round(easeOutCubic(progress) * target);
    el.textContent = value;
    if (progress < 1) {
      scoreRafId = requestAnimationFrame(step);
    } else {
      el.textContent = target;
    }
  }
  scoreRafId = requestAnimationFrame(step);
}

// ============================================================
// PARTICLE BURST (Like)
// ============================================================
function spawnParticleBurst(x, y) {
  const colors = ['#FF4D8D', '#7F5AF0', '#00E5FF', '#FFD200', '#FF6B6B', '#43E97B'];
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (i / 18) * Math.PI * 2;
    const dist = 60 + Math.random() * 80;
    const tx = Math.cos(angle) * dist + 'px';
    const ty = Math.sin(angle) * dist + 'px';
    const size = 6 + Math.random() * 8;
    p.style.cssText = `
      left:${x}px; top:${y}px;
      width:${size}px; height:${size}px;
      background:${colors[Math.floor(Math.random() * colors.length)]};
      --tx:${tx}; --ty:${ty};
      animation-duration:${0.6 + Math.random() * 0.4}s;
      animation-delay:${Math.random() * 0.1}s;
    `;
    document.body.appendChild(p);
    p.addEventListener('animationend', () => p.remove());
  }
}

// ============================================================
// RIPPLE RINGS (SuperLike)
// ============================================================
function spawnRippleRings(x, y) {
  for (let i = 0; i < 3; i++) {
    const ring = document.createElement('div');
    ring.className = 'ripple-ring';
    ring.style.cssText = `
      left:${x}px; top:${y}px;
      animation-delay:${i * 0.18}s;
      animation-duration:0.8s;
    `;
    document.body.appendChild(ring);
    ring.addEventListener('animationend', () => ring.remove());
  }
}

      <div class="photo-pattern"
           style="background-image:${getPatternSVG(photo.pattern)};background-size:${photo.pattern === 'dots' ? '20px 20px' : photo.pattern === 'wave' ? '80px 40px' : photo.pattern === 'grid' ? '30px 30px' : '60px 60px'};"></div>

        <div>${interestTags}</div>

    </div>

    <div class="thumbnail-strip">${thumbnails}</div>

      <div class="about-section">
        <p style="font-size:12px;line-height:1.7;color:var(--text-muted);">${profile.bio}</p>
      </div>
    </div>

    <div class="panel-section" style="margin-bottom:0;">
      <div class="section-title">Quick Facts</div>
      <div>${quickFactsHTML}</div>
    </div>
  `;

  // Staggered bar fill animation
  requestAnimationFrame(() => {
    const bars = container.querySelectorAll('.trait-bar-fill');
    bars.forEach((bar, i) => {
      setTimeout(() => {
        requestAnimationFrame(() => {
          bar.style.width = bar.dataset.value + '%';
        });
      }, i * 120);
    });
  });
}

// ============================================================
// RENDER: MATCH BANNER
// ============================================================
function renderBanner(profile) {
  const subtitle = document.getElementById('match-subtitle');
  const signals = Object.values(profile.personalityTraits).filter(v => v > 75).length + profile.interests.length;
  subtitle.textContent = `Based on ${signals} shared compatibility signals`;
  animateScore(profile.matchScore);
}

// ============================================================
// RENDER: RECENT MATCHES SIDEBAR
// ============================================================
function renderRecentMatches() {
  const container = document.getElementById('recent-matches');
  const preview = PROFILES.slice(0, 5);
  container.innerHTML = preview.map((p, i) => `
    <div class="match-item" data-profile="${i}">
      <div class="match-avatar" style="background:${AVATAR_GRADIENTS[i % AVATAR_GRADIENTS.length]};">
        ${p.name.charAt(0)}
        <span class="match-score-badge">${p.matchScore}%</span>
      </div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;font-weight:600;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.name}, ${p.age}</div>
        <div style="font-size:11px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.interests[0]} · ${p.interests[1]}</div>
      </div>
      ${i < 3 ? '<div class="unread-dot"></div>' : ''}
    </div>
  `).join('');
}

// ============================================================
// RENDER: AI SUGGESTION
// ============================================================
function renderAISuggestion(profile) {
  document.getElementById('ai-suggestion').textContent = profile.aiSuggestion;
}

// ============================================================
// RENDER ALL
// ============================================================
function renderAll() {
  const profile = PROFILES[STATE.currentProfileIndex % PROFILES.length];
  STATE.currentPhotoIndex = 0;
  renderProfileCard(profile);
  renderRightPanel(profile);
  renderBanner(profile);
  renderAISuggestion(profile);
}

// ============================================================
// PHOTO CAROUSEL
// ============================================================
function goToPhoto(index) {
  const profile = PROFILES[STATE.currentProfileIndex % PROFILES.length];
  const count = profile.photos.length;
  index = ((index % count) + count) % count;

  const card = document.getElementById('profile-card');
  const slides = card.querySelectorAll('.photo-slide');
  const dots = card.querySelectorAll('.progress-dot');
  const thumbs = card.querySelectorAll('.thumbnail');

  slides.forEach((s, i) => s.classList.toggle('active', i === index));
  dots.forEach((d, i) => d.classList.toggle('active', i === index));
  thumbs.forEach((t, i) => t.classList.toggle('active', i === index));

  STATE.currentPhotoIndex = index;
}

function changePhoto(dir) {
  goToPhoto(STATE.currentPhotoIndex + dir);
}

// ============================================================
// CARD TRANSITION
// ============================================================
function advanceProfile(animation) {
  if (STATE.isAnimating) return;
  STATE.isAnimating = true;

  const card = document.getElementById('profile-card');
  card.style.animation = `${animation} 0.45s cubic-bezier(0.55, 0, 1, 0.45) forwards`;

  setTimeout(() => {
    STATE.currentProfileIndex = (STATE.currentProfileIndex + 1) % PROFILES.length;
    card.style.animation = 'none';
    renderAll();
    STATE.isAnimating = false;
  }, 460);
}

// ============================================================
// ACTION HANDLERS
// ============================================================
document.getElementById('btn-like').addEventListener('click', function(e) {
  if (STATE.isAnimating) return;
  const profile = PROFILES[STATE.currentProfileIndex % PROFILES.length];
  STATE.likedProfiles.add(profile.id);

  const rect = this.getBoundingClientRect();
  spawnParticleBurst(rect.left + rect.width / 2, rect.top + rect.height / 2);
  advanceProfile('slideRight');
});

document.getElementById('btn-pass').addEventListener('click', function() {
  if (STATE.isAnimating) return;
  const profile = PROFILES[STATE.currentProfileIndex % PROFILES.length];
  STATE.passedProfiles.add(profile.id);
  advanceProfile('slideLeft');
});

document.getElementById('btn-superlike').addEventListener('click', function(e) {
  if (STATE.isAnimating) return;
  const profile = PROFILES[STATE.currentProfileIndex % PROFILES.length];
  STATE.superLikedProfiles.add(profile.id);

  const rect = this.getBoundingClientRect();
  spawnRippleRings(rect.left + rect.width / 2, rect.top + rect.height / 2);
  advanceProfile('slideRight');
});

document.getElementById('btn-boost').addEventListener('click', function() {
  this.style.background = 'rgba(127,90,240,0.3)';
  setTimeout(() => { this.style.background = ''; }, 600);
});

// ============================================================
// NAV
// ============================================================
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', function() {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    this.classList.add('active');
    STATE.activeNav = this.dataset.nav;
  });
});

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'l') document.getElementById('btn-like').click();
  if (e.key === 'ArrowLeft' || e.key === 'p') document.getElementById('btn-pass').click();
  if (e.key === 'ArrowUp' || e.key === 's') document.getElementById('btn-superlike').click();
  if (e.key === 'ArrowDown') changePhoto(1);
});

// ============================================================
// INIT
// ============================================================
renderRecentMatches();
renderAll();
</script>
</body>
</html>
